<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Grifos Mágicos RPG</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 10px; background-color: #f0f0f0; display: flex; height: 100vh; box-sizing: border-box; overflow: hidden; }
        h3 { margin-top: 0; padding-bottom: 5px; border-bottom: 1px solid #ccc; font-size: 16px; }
        
        .panel { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .left-panel { width: 350px; flex-shrink: 0; }
        .center-panel { flex-grow: 1; margin: 0 15px; display: flex; flex-direction: column; overflow: hidden; }
        .right-panel { width: 250px; flex-shrink: 0; }

        .preview-box { display: flex; justify-content: center; background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 10px; }
        canvas#previewCanvas { border: 1px dashed #aaa; }
        
        .paper-container { flex-grow: 1; border: 2px solid #333; background: white; overflow: auto; position: relative; cursor: crosshair; }
        canvas#paperCanvas { display: block; }
        
        .grid-layout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; text-align: center; align-items: center; }
        
        /* ID e Código */
        .id-container { background: #e9ecef; padding: 10px; border-radius: 6px; border: 1px solid #ced4da; }
        .id-input-group { display: flex; gap: 5px; margin-top: 5px; margin-bottom: 5px; }
        .id-input-group input { flex-grow: 1; font-family: monospace; font-size: 12px; padding: 5px; border: 1px solid #aaa; border-radius: 4px; }
        .btn-copy { background: #6c757d; padding: 5px 10px; border-radius: 4px; border: none; color: white; cursor: pointer; font-weight: bold;}
        .btn-copy:hover { background: #5a6268; }
        .btn-load { background: #ffc107; color: black; width: 100%; border: 1px solid #d39e00; }
        .btn-load:hover { background: #e0a800; }

        /* Estilos do Modal (Janela Flutuante) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none; justify-content: center; align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: white; padding: 20px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            text-align: center;
            max-width: 95vw; max-height: 95vh; overflow-y: auto;
        }
        .matrix-container { background: #fafafa; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; }
        table.matrix-table { border-collapse: collapse; margin: 0 auto; }
        table.matrix-table td { padding: 4px; }
        table.matrix-table select { width: 55px; height: 35px; text-align: center; font-family: monospace; font-size: 16px; cursor: pointer; }
        
        button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; background: #007bff; color: white; font-weight: bold; }
        button:hover { background: #0056b3; }
        button.tool-btn { background: #28a745; margin-bottom: 5px; width: 100%;}
        button.tool-btn:hover { background: #218838; }
        button.color-btn { width: 100%; border: 1px solid #000; text-shadow: 1px 1px 2px rgba(255,255,255,0.5); }
        button.modal-btn { background: #6c757d; font-size: 14px; }
        
        .stamp-slot { border: 1px solid #ccc; padding: 10px; border-radius: 4px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px; background: #f9f9f9; }
        .stamp-label { font-size: 14px; font-weight: bold; text-align: center; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
        
        input[type="checkbox"], select { cursor: pointer; }
        .header-info { color: blue; font-weight: bold; margin-bottom: 5px; font-size: 14px; text-align: center; }

        /* Estilos do Terminal Secreto */
        #secretPanel {
            position: fixed; top: 5%; left: 5%; width: 90%; height: 90%;
            background: rgba(10, 10, 10, 0.95); border: 2px solid #0f0;
            color: #0f0; z-index: 9999; padding: 20px; font-family: monospace;
            display: none; box-sizing: border-box; flex-direction: column;
            border-radius: 8px; box-shadow: 0 0 20px #0f0;
        }
        #terminalOutput {
            flex-grow: 1; overflow-y: auto; background: #000; border: 1px solid #333;
            padding: 15px; margin-top: 15px; white-space: pre-wrap; word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div id="secretPanel">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0;">TERMINAL ADM - DECODIFICADOR DE GRIFOS</h2>
            <button onclick="document.getElementById('secretPanel').style.display='none'" style="background: #f00; color: #fff; padding: 5px 15px; font-weight: bold; border: none; cursor: pointer;">X FECHAR</button>
        </div>
        <p style="margin: 15px 0;">ID Capturado: <span id="admCurrentId" style="background: #222; padding: 2px 5px;"></span></p>
        
        <div style="display: flex; gap: 10px;">
            <button id="btnRunCode" style="background: #0f0; color: #000; font-weight: bold; padding: 10px 20px; border: none; cursor: pointer;">RODAR ANÁLISE</button>
            
            <button id="btnSaveSVG" style="background: #20c997; color: black; font-weight: bold; padding: 10px 20px; border: none; cursor: pointer;">EXPORTAR SVG (3D)</button>
        </div>

        <div id="terminalOutput">Aguardando execução...</div>
    </div>

    <div class="panel left-panel">
        
        <div class="id-container">
            <label style="font-size: 13px; font-weight: bold;">Código / ID do Grifo:</label>
            <div class="id-input-group">
                <input type="text" id="glyphCodeInput" placeholder="Gerando código...">
                <button id="btnCopyCode" class="btn-copy" title="Copiar">Copiar</button>
            </div>
            <button id="btnLoadCode" class="btn-load tool-btn">Carregar ID Colado</button>
        </div>

        <div class="preview-box">
            <canvas id="previewCanvas" width="340" height="340" style="max-width: 100%; height: auto;"></canvas>
        </div>

        <input type="color" id="lineColor" value="#000000" style="display:none;">
        <button id="btnColor" class="color-btn" style="background-color: #000000; color: white;">Escolher Cor das Linhas</button>

        <label><strong>Nível do Círculo:</strong></label>
        <select id="levelCombo">
            <option value="1">Nível 1 (Apenas Núcleo)</option>
            <option value="2">Nível 2 (Matriz 3x3)</option>
            <option value="3">Nível 3 (Matriz 5x5)</option>
            <option value="4">Nível 4 (Matriz 7x7)</option>
        </select>

        <label><strong>Núcleo (Letra Central):</strong></label>
        <select id="coreCombo"></select>

        <label><strong>Barras de Direção:</strong></label>
        <div class="grid-layout">
            <div></div> <div><label><input type="checkbox" id="chkTop"> Cima</label></div> <div></div>
            <div><label><input type="checkbox" id="chkLeft"> Esq</label></div> <div></div> <div><label><input type="checkbox" id="chkRight"> Dir</label></div>
            <div></div> <div><label><input type="checkbox" id="chkBottom"> Baixo</label></div> <div></div>
        </div>

        <label><strong>Modificadores:</strong></label>
        <button id="btnOpenMatrix" class="tool-btn modal-btn">Abrir Matriz de Modificadores</button>
        
        <button id="btnChaos" class="tool-btn" style="background-color: #fd7e14; color: black; border: 1px solid #d39e00; margin-top: 5px;">🎲 Gerar Grifo Aleatório (Caos)</button>

        <hr style="width: 100%; border: 1px solid #ddd; margin: 5px 0;">
        
        <button id="btnAlignMode" class="tool-btn" style="background-color: #6f42c1;">Modo Alinhamento: OFF</button>
        <button class="tool-btn" id="btnEquipBrush">Equipar Pincel</button>
    </div>

    <div class="panel center-panel">
        <div id="lblTool" class="header-info">Ferramenta Atual: Pincel<br><span style="font-size:12px; font-weight:normal; color:#333;" id="lblInstrucoes">(Botão Esquerdo PINTA | Botão Direito ARRASTE para recortar)</span></div>
        <div style="display: flex; gap: 8px; margin-bottom: 10px; justify-content: center; flex-wrap: wrap;">
            <button id="btnClear" style="background: #dc3545;">Limpar Folha</button>
            <button id="btnSaveImage">Salvar (C/ Fundo)</button>
            <button id="btnSaveTransparent" style="background: #17a2b8;">Salvar (Sem Fundo)</button>
            </div>
        
        <div class="paper-container" id="paperContainer">
            <canvas id="paperCanvas" width="1200" height="1500"></canvas>
        </div>
    </div>

    <div class="panel right-panel" id="stampsPanel">
        <h3>Carimbos (Slots Rápidos)</h3>
    </div>

    <div id="matrixModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="border: none; font-size: 18px;">Editar Modificadores</h3>
            <div class="matrix-container">
                <table class="matrix-table" id="matrixTable"></table>
            </div>
            <button id="btnCloseMatrix" class="tool-btn">Confirmar e Fechar</button>
        </div>
    </div>

<script>
    // Configurações Base
    const VALID_MODS = ["", "─", "│", "╱", "╲", "+", "<", ">", "#", "$", "&", "=", "÷", "□", "■", "●", "%", ..."ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("")];
    const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    const CELL_SIZE = 30;
    
    // Estado da Aplicação
    let activeTool = "brush"; 
    let stamps = [null, null, null, null];
    let drawnGlyphs = []; 
    
    // Estado do Alinhamento
    let alignMode = false;
    let alignSource = null; 
    let hoveredGlyph = null; 
    let currentMousePos = {x: 0, y: 0};
    let snappedPos = null;
    
    // Elementos da UI
    const previewCanvas = document.getElementById('previewCanvas');
    const previewCtx = previewCanvas.getContext('2d');
    const paperCanvas = document.getElementById('paperCanvas');
    const paperCtx = paperCanvas.getContext('2d');
    const codeInput = document.getElementById('glyphCodeInput');
    const btnAlignMode = document.getElementById('btnAlignMode');
    const lblInstrucoes = document.getElementById('lblInstrucoes');
    
    // Preencher ComboBox de Letras
    const coreCombo = document.getElementById('coreCombo');
    ALPHABET.forEach(letter => {
        let opt = document.createElement('option');
        opt.value = letter;
        opt.textContent = letter;
        coreCombo.appendChild(opt);
    });

    // ------------------------------------------------------------------
    // SISTEMA DO TERMINAL ADM
    // ------------------------------------------------------------------
    
    document.addEventListener('keydown', function(event) {
        if (event.ctrlKey && event.shiftKey && event.key.toUpperCase() === 'Y') {
            const panel = document.getElementById('secretPanel');
            if (panel.style.display === 'none' || panel.style.display === '') {
                panel.style.display = 'flex';
                document.getElementById('admCurrentId').innerText = codeInput.value;
                document.getElementById('terminalOutput').innerHTML = "Aguardando execução...";
            } else {
                panel.style.display = 'none';
            }
        }
    });

    function obterElementoBase(letra) {
        const mapa = {
            'S': "Ar", 'W': "Fogo", 'H': "Terra", 'R': "Agua", 'Z': "Raio",
            'K': "Calor", 'M': "Planta", 'A': "Gelo", 'X': "Luz", 'O': "Vacuo",
            'G': "Pedra", 'C': "Sabao", 'V': "Explosao", 'U': "Barro", 'E': "Frio",
            'J': "Som", 'P': "Portal", 'F': "Areia", 'D': "Metal", 'B': "Madeira",
            'N': "Cura", 'Q': "Visao", 'Y': "Fio", 'T': "Repulsao", 'L': "Vidro",
            'I': "Materia Escura"
        };
        return mapa[letra] || "Elemento Desconhecido";
    }

    function obterModificador(codigo) {
        const mapa = {
            1: "- (Aumento de forca)", 2: "│ (Aumento de forca)", 3: "╱ (Aumento de forca)", 
            4: "╲ (Aumento de forca)", 5: "+ (Aumento de tempo)", 6: "< (Aumento de raio)",
            7: "> (Aumento de raio)", 8: "# (Aumenta a resistencia)", 9: "$ (Aumenta a velocidade)",
            10: "& (Infusao)", 11: "= (Fusao / Criar Composto)", 12: "÷ (Inversao)",
            13: "◇ (Placa)", 14: "■ (Cubo)", 15: "• (Esfera)", 16: "% (repetir)"
        };
        if (mapa[codigo]) return mapa[codigo];
        if (codigo >= 16 && codigo <= 41) {
            let letra = String.fromCharCode('A'.charCodeAt(0) + (codigo - 16));
            return `Elemento Secundario [${letra}] - ${obterElementoBase(letra)}`;
        }
        return "Simbolo Desconhecido";
    }

    function identificarFusao(nucleo, m) {
        let pares_raio = Math.min(m[6] || 0, m[7] || 0); 
        
        if (nucleo === 'W' && m[9] >= 2 && pares_raio >= 1) return "Calor (K)";
        if (nucleo === 'W' && m[9] >= 1 && pares_raio >= 2) return "Explosao (V)";
        if (nucleo === 'H' && m[9] >= 3) return "Planta (M)";
        if (nucleo === 'R' && m[8] >= 2 && m[9] >= 1) return "Gelo (A)";
        if (nucleo === 'Z' && m[9] >= 3) return "Luz (X)";
        if (nucleo === 'S' && pares_raio >= 2 && m[9] >= 1) return "Vacuo (O)";
        if (nucleo === 'H' && m[8] >= 3) return "Pedra (G)";
        if (nucleo === 'R' && pares_raio >= 1 && m[10] >= 1 && m[8] >= 1) return "Sabao (C)";
        if (nucleo === 'H' && m[5] >= 1 && m[8] >= 1) return "Barro (U)";
        if (nucleo === 'S' && m[8] >= 2 && pares_raio >= 1) return "Frio (E)";
        if (nucleo === 'S' && m[9] >= 1 && pares_raio >= 1 && m[10] >= 1) return "Som (J)";
        if (nucleo === 'Z' && pares_raio >= 2 && m[10] >= 1) return "Portal (P)";
        if (nucleo === 'H' && pares_raio >= 1 && m[8] >= 1 && m[12] >= 1) return "Areia (F)";
        if (nucleo === 'G' && m[8] >= 3) return "Metal (D)";
        if (nucleo === 'M' && m[8] >= 2 && pares_raio >= 1) return "Madeira (B)";
        if (nucleo === 'M' && pares_raio >= 2 && m[9] >= 1) return "Cura (N)";
        if (nucleo === 'X' && pares_raio >= 3) return "Visao (Q)"; 
        if (nucleo === 'M' && pares_raio >= 3) return "Fio (Y)";
        if (nucleo === 'O' && pares_raio >= 2 && m[8] >= 1) return "Repulsao (T)";
        if (nucleo === 'F' && m[8] >= 2 && m[10] >= 1) return "Vidro (L)";
        
        if (nucleo === 'O' && m[20] >= 1 && m[35] >= 1) return "Materia Escura (I)";

        return "Falha na Fusao (Receita Invalida / Incompleta)";
    }

    document.getElementById('btnRunCode').onclick = () => {
        let id = document.getElementById('admCurrentId').innerText;
        let out = document.getElementById('terminalOutput');
        
        if (id.length < 17) {
            out.innerHTML = "<span style='color:red'>Erro fatal: ID invalido! Muito curto.</span>";
            return;
        }

        try {
            let nivel = parseInt(id.substring(0, 2), 10);
            let valNucleo = parseInt(id.substring(2, 4), 10);
            let nucleo = String.fromCharCode('A'.charCodeAt(0) + (valNucleo - 1));
            
            let dir_cima = id[4] === '1';
            let dir_baixo = id[5] === '1';
            let dir_esq = id[6] === '1';
            let dir_dir = id[7] === '1';
            
            let direcao_texto = "";
            if (dir_cima && dir_baixo && !dir_esq && !dir_dir) direcao_texto = "Reto (Cima e Baixo)";
            else if (dir_cima && dir_dir) direcao_texto = "Diagonal Direita para Cima";
            else if (dir_cima && dir_esq) direcao_texto = "Diagonal Esquerda para Cima";
            else if (dir_baixo && dir_dir) direcao_texto = "Diagonal Direita para Baixo";
            else if (dir_baixo && dir_esq) direcao_texto = "Diagonal Esquerda para Baixo";
            else if (dir_cima) direcao_texto = "Para Cima";
            else if (dir_baixo) direcao_texto = "Para Baixo";
            else if (dir_esq) direcao_texto = "Para o Lado (Esquerda)";
            else if (dir_dir) direcao_texto = "Para o Lado (Direita)";
            else direcao_texto = "Sem direcao ou Imovel";
            
            let r = parseInt(id.substring(8, 11), 10);
            let g = parseInt(id.substring(11, 14), 10);
            let b = parseInt(id.substring(14, 17), 10);
            let inv_r = 255 - r, inv_g = 255 - g, inv_b = 255 - b;
            
            let qtd_celulas = (nivel === 2) ? 8 : (nivel === 3) ? 24 : (nivel === 4) ? 48 : 0;
            let modificadores = Array(42).fill(0);
            let index_atual = 17;
            let tem_igual = false;
            
            for (let i = 0; i < qtd_celulas; i++) {
                if (index_atual + 1 >= id.length) break;
                let cod_mod = parseInt(id.substring(index_atual, index_atual + 2), 10);
                if (cod_mod >= 0 && cod_mod <= 41) {
                    modificadores[cod_mod]++;
                    if (cod_mod === 11) tem_igual = true;
                }
                index_atual += 2;
            }
            
            let res = `<div style="color: rgb(${r},${g},${b}); background-color: rgb(${inv_r},${inv_g},${inv_b}); padding: 10px; border-radius: 4px;">`;
            res += `==========================================\n`;
            res += `         ANALISE DO GRIFO MAGICO          \n`;
            res += `==========================================\n`;
            res += `-> Nivel do Grifo: ${nivel}\n`;
            res += `-> Nucleo Primario: [${nucleo}] - ${obterElementoBase(nucleo)}\n`;
            res += `-> Direcao de Lancamento: ${direcao_texto}\n`;
            res += `\n--- COMPOSICAO E MODIFICADORES ---\n`;
            
            if (tem_igual) {
                res += `[!] FUSAO MAGICA DETECTADA ('=')\n`;
                res += `-> Novo Elemento Gerado: *** ${identificarFusao(nucleo, modificadores)} ***\n`;
                res += `   (Receita baseada nos modificadores ativos descritos abaixo)\n\n`;
            }
            
            let mods_encontrados = 0;
            for (let i = 1; i <= 41; i++) {
                if (modificadores[i] > 0) {
                    res += ` - ${modificadores[i]}x ${obterModificador(i)}\n`;
                    mods_encontrados++;
                }
            }
            
            if (mods_encontrados === 0) {
                res += ` - Nenhum modificador ativo encontrado (00).\n`;
            }
            
            res += `\n-> Cor RGB Original: (${r}, ${g}, ${b})\n`;
            res += `==========================================\n</div>`;
            
            out.innerHTML = res;
        } catch(e) {
            out.innerHTML = "<span style='color:red'>[ERRO FATAL] Ocorreu uma falha no parsing: " + e.message + "</span>";
        }
    };

    document.getElementById('btnChaos').onclick = () => {
        let randomCoreIdx = Math.floor(Math.random() * ALPHABET.length);
        coreCombo.value = ALPHABET[randomCoreIdx];
        
        document.getElementById('chkTop').checked = Math.random() > 0.5;
        document.getElementById('chkBottom').checked = Math.random() > 0.5;
        document.getElementById('chkLeft').checked = Math.random() > 0.5;
        document.getElementById('chkRight').checked = Math.random() > 0.5;
        
        let r = Math.floor(Math.random() * 180);
        let g = Math.floor(Math.random() * 180);
        let b = Math.floor(Math.random() * 180);
        applyColorStyle(rgbToHex(r, g, b));
        
        let lvl = parseInt(levelCombo.value);
        if (lvl > 1) {
            let size = (lvl * 2) - 1;
            let trs = matrixTable.querySelectorAll('tr');
            for (let row = 0; row < size; row++) {
                let selects = trs[row].querySelectorAll('select');
                for (let col = 0; col < size; col++) {
                    let isCenter = (row === Math.floor(size/2) && col === Math.floor(size/2));
                    if (!isCenter) {
                        if (Math.random() > 0.5) {
                            let randomModIdx = Math.floor(Math.random() * (VALID_MODS.length - 1)) + 1; 
                            selects[col].value = VALID_MODS[randomModIdx];
                        } else {
                            selects[col].value = ""; 
                        }
                    }
                }
            }
        }
        
        updatePreview();
        equipBrush(); 
    };

    btnAlignMode.onclick = () => {
        alignMode = !alignMode;
        if (alignMode) {
            btnAlignMode.style.backgroundColor = "#28a745"; 
            btnAlignMode.innerText = "Modo Alinhamento: ON";
            updateInstrucoes();
        } else {
            btnAlignMode.style.backgroundColor = "#6f42c1"; 
            btnAlignMode.innerText = "Modo Alinhamento: OFF";
            alignSource = null; 
            updateInstrucoes();
            redrawPaper();
        }
    };

    function updateInstrucoes() {
        if (!alignMode) {
            lblInstrucoes.innerText = "(Botão Esq PINTA | Botão Dir ARRASTA p/ recortar)";
        } else if (alignMode && !alignSource) {
            lblInstrucoes.innerHTML = "<span style='color: #dc3545;'>Clique em um grifo existente para ser a Âncora Central</span>";
        } else if (alignMode && alignSource) {
            lblInstrucoes.innerHTML = "<span style='color: #28a745;'>Esquerdo: Carimba alinhado | Direito: Solta a Âncora</span>";
        }
    }

    const modal = document.getElementById('matrixModal');
    const btnOpenMatrix = document.getElementById('btnOpenMatrix');
    const btnCloseMatrix = document.getElementById('btnCloseMatrix');

    btnOpenMatrix.onclick = () => {
        let lvl = parseInt(levelCombo.value);
        if (lvl === 1) {
            alert("O Nível 1 não possui modificadores extras. Apenas o núcleo central.");
        } else {
            modal.style.display = 'flex';
        }
    };
    
    btnCloseMatrix.onclick = () => {
        modal.style.display = 'none';
        updatePreview();
    };
    
    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = "none";
            updatePreview();
        }
    }

    const colorInput = document.getElementById('lineColor');
    const btnColor = document.getElementById('btnColor');
    btnColor.onclick = () => colorInput.click();
    colorInput.oninput = (e) => {
        applyColorStyle(e.target.value);
        updatePreview();
    };

    function hexToRgb(hex) {
        let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : {r:0,g:0,b:0};
    }

    function rgbToHex(r, g, b) {
        return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase();
    }

    function applyColorStyle(hex) {
        let rgb = hexToRgb(hex);
        let luminance = rgb.r * 0.299 + rgb.g * 0.587 + rgb.b * 0.114;
        btnColor.style.backgroundColor = hex;
        btnColor.style.color = luminance > 128 ? 'black' : 'white';
        colorInput.value = hex;
    }

    const levelCombo = document.getElementById('levelCombo');
    const matrixTable = document.getElementById('matrixTable');
    
    function updateMatrixUI() {
        matrixTable.innerHTML = "";
        let lvl = parseInt(levelCombo.value);
        if (lvl === 1) {
            updatePreview();
            return;
        }
        
        let size = (lvl * 2) - 1;
        for (let r = 0; r < size; r++) {
            let tr = document.createElement('tr');
            for (let c = 0; c < size; c++) {
                let td = document.createElement('td');
                let select = document.createElement('select');
                VALID_MODS.forEach(mod => {
                    let opt = document.createElement('option');
                    opt.value = mod; opt.textContent = mod;
                    select.appendChild(opt);
                });
                
                let isCenter = (r === Math.floor(size/2) && c === Math.floor(size/2));
                if (isCenter) select.disabled = true;
                
                select.onchange = updatePreview;
                td.appendChild(select);
                tr.appendChild(td);
            }
            matrixTable.appendChild(tr);
        }
        updatePreview();
    }

    levelCombo.onchange = updateMatrixUI;
    coreCombo.onchange = updatePreview;
    ['chkTop', 'chkBottom', 'chkLeft', 'chkRight'].forEach(id => {
        document.getElementById(id).onchange = updatePreview;
    });

    function configToCode(config) {
        let lvlStr = String(config.level).padStart(2, '0');
        let coreStr = String(ALPHABET.indexOf(config.core) + 1).padStart(2, '0');
        
        let t = config.bars.top ? 1 : 0;
        let b = config.bars.bottom ? 1 : 0;
        let l = config.bars.left ? 1 : 0;
        let r = config.bars.right ? 1 : 0;
        let barsStr = `${t}${b}${l}${r}`;
        
        let rgb = hexToRgb(config.color);
        let colorStr = String(rgb.r).padStart(3, '0') + String(rgb.g).padStart(3, '0') + String(rgb.b).padStart(3, '0');
        
        let matrixStr = "";
        if (config.level > 1 && config.matrix) {
            let size = (config.level * 2) - 1;
            for (let row = 0; row < size; row++) {
                for (let col = 0; col < size; col++) {
                    let isCenter = (row === Math.floor(size/2) && col === Math.floor(size/2));
                    if (!isCenter) { 
                        let val = config.matrix[row][col];
                        let idx = VALID_MODS.indexOf(val);
                        if(idx === -1) idx = 0;
                        matrixStr += String(idx).padStart(2, '0');
                    }
                }
            }
        }
        return lvlStr + coreStr + barsStr + colorStr + matrixStr;
    }

    document.getElementById('btnLoadCode').onclick = () => {
        let code = codeInput.value.trim();
        if(code.length < 17) return alert("Código inválido ou muito curto!");
        
        try {
            let lvl = parseInt(code.substring(0, 2));
            if(lvl < 1 || lvl > 4) throw "Nível inválido";
            levelCombo.value = lvl;
            
            let coreIdx = parseInt(code.substring(2, 4)) - 1;
            if(coreIdx >= 0 && coreIdx < ALPHABET.length) coreCombo.value = ALPHABET[coreIdx];
            
            document.getElementById('chkTop').checked = code[4] === '1';
            document.getElementById('chkBottom').checked = code[5] === '1';
            document.getElementById('chkLeft').checked = code[6] === '1';
            document.getElementById('chkRight').checked = code[7] === '1';
            
            let r = parseInt(code.substring(8, 11));
            let g = parseInt(code.substring(11, 14));
            let b = parseInt(code.substring(14, 17));
            applyColorStyle(rgbToHex(r, g, b));
            
            updateMatrixUI();
            
            if (lvl > 1) {
                let size = (lvl * 2) - 1;
                let ptr = 17; 
                let trs = matrixTable.querySelectorAll('tr');
                
                for (let row = 0; row < size; row++) {
                    let selects = trs[row].querySelectorAll('select');
                    for (let col = 0; col < size; col++) {
                        let isCenter = (row === Math.floor(size/2) && col === Math.floor(size/2));
                        if (!isCenter) {
                            let modIdx = parseInt(code.substring(ptr, ptr + 2));
                            ptr += 2;
                            if (!isNaN(modIdx) && modIdx >= 0 && modIdx < VALID_MODS.length) {
                                selects[col].value = VALID_MODS[modIdx];
                            }
                        }
                    }
                }
            }
            updatePreview();
            alert("Grifo mágico carregado com sucesso!");
        } catch(e) {
            alert("Erro ao ler o código: Formato Incorreto.");
        }
    };

    document.getElementById('btnCopyCode').onclick = () => {
        codeInput.select();
        document.execCommand('copy');
        let btn = document.getElementById('btnCopyCode');
        btn.innerText = "Copiado!";
        setTimeout(() => btn.innerText = "Copiar", 1500);
    };

    class Glyph {
        constructor(x, y, config) {
            this.x = x;
            this.y = y;
            this.config = config;
            
            if (config.level === 1) this.radius = 35;
            else if (config.level === 2) this.radius = 60;
            else if (config.level === 3) this.radius = 105;
            else this.radius = 150;
        }
        
        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.strokeStyle = this.config.color;
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.strokeStyle = this.config.color;
            ctx.lineWidth = 4;
            let bLen = 15;
            if (this.config.bars.top) { ctx.beginPath(); ctx.moveTo(0, -this.radius); ctx.lineTo(0, -this.radius + bLen); ctx.stroke(); }
            if (this.config.bars.bottom) { ctx.beginPath(); ctx.moveTo(0, this.radius); ctx.lineTo(0, this.radius - bLen); ctx.stroke(); }
            if (this.config.bars.left) { ctx.beginPath(); ctx.moveTo(-this.radius, 0); ctx.lineTo(-this.radius + bLen, 0); ctx.stroke(); }
            if (this.config.bars.right) { ctx.beginPath(); ctx.moveTo(this.radius, 0); ctx.lineTo(this.radius - bLen, 0); ctx.stroke(); }
            
            ctx.fillStyle = this.config.color;
            ctx.font = "bold 16px Courier";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            if (this.config.level > 1) {
                let size = (this.config.level * 2) - 1;
                let startX = -(size * CELL_SIZE) / 2 + (CELL_SIZE / 2);
                let startY = -(size * CELL_SIZE) / 2 + (CELL_SIZE / 2);
                
                for (let r = 0; r < size; r++) {
                    for (let c = 0; c < size; c++) {
                        let isCenter = (r === Math.floor(size/2) && c === Math.floor(size/2));
                        if (!isCenter && this.config.matrix[r][c]) {
                            ctx.fillText(this.config.matrix[r][c], startX + c * CELL_SIZE, startY + r * CELL_SIZE);
                        }
                    }
                }
            }
            
            ctx.fillStyle = "#3232c8";
            ctx.font = "bold 18px Courier";
            ctx.fillText(this.config.core, 0, 0);
            
            ctx.restore();
        }
    }

    function getCurrentConfig() {
        let lvl = parseInt(levelCombo.value);
        let config = {
            level: lvl,
            core: coreCombo.value,
            color: colorInput.value,
            bars: {
                top: document.getElementById('chkTop').checked,
                bottom: document.getElementById('chkBottom').checked,
                left: document.getElementById('chkLeft').checked,
                right: document.getElementById('chkRight').checked
            },
            matrix: []
        };
        
        if (lvl > 1) {
            let trs = matrixTable.querySelectorAll('tr');
            trs.forEach(tr => {
                let row = [];
                tr.querySelectorAll('select').forEach(sel => row.push(sel.value));
                config.matrix.push(row);
            });
        }
        return config;
    }

    function getActiveConfig() {
        if (activeTool === "brush") return getCurrentConfig();
        let stamp = stamps[activeTool];
        if (stamp) return stamp;
        equipBrush();
        return getCurrentConfig();
    }

    function updatePreview() {
        previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
        let config = getCurrentConfig();
        
        codeInput.value = configToCode(config);
        
        let painelSecreto = document.getElementById('secretPanel');
        if (painelSecreto.style.display === 'flex') {
            document.getElementById('admCurrentId').innerText = codeInput.value;
        }
        
        let glyph = new Glyph(previewCanvas.width / 2, previewCanvas.height / 2, config);
        glyph.draw(previewCtx);
        
        redrawPaper(); 
    }

    const stampsPanel = document.getElementById('stampsPanel');
    for (let i = 0; i < 4; i++) {
        let div = document.createElement('div');
        div.className = 'stamp-slot';
        div.innerHTML = `
            <div class="stamp-label" id="lblStamp${i}" title="Vazio">Vazio</div>
            <button class="tool-btn" style="background:#17a2b8;" onclick="saveToStamp(${i})">Salvar Pincel Aqui</button>
            <button class="tool-btn" onclick="equipStamp(${i})">Equipar Carimbo</button>
            <button class="tool-btn" style="background:#ffc107; color:black;" onclick="editStamp(${i})">Editar Carimbo</button>
        `;
        stampsPanel.appendChild(div);
    }

    function equipBrush() {
        activeTool = "brush";
        document.getElementById('lblTool').innerHTML = `Ferramenta Atual: Pincel<br><span style="font-size:12px; font-weight:normal; color:#333;" id="lblInstrucoes"></span>`;
        updateInstrucoes();
    }
    document.getElementById('btnEquipBrush').onclick = equipBrush;

    window.saveToStamp = function(idx) {
        let config = getCurrentConfig();
        stamps[idx] = config;
        let idStr = configToCode(config);
        let lbl = document.getElementById(`lblStamp${idx}`);
        lbl.innerText = `Nív ${config.level} | ${idStr.substring(0, 15)}...`;
        lbl.title = "ID Completo: " + idStr; 
    };

    window.equipStamp = function(idx) {
        if (stamps[idx]) {
            activeTool = idx;
            document.getElementById('lblTool').innerHTML = `Ferramenta Atual: Carimbo ${idx+1}<br><span style="font-size:12px; font-weight:normal; color:#333;" id="lblInstrucoes"></span>`;
            updateInstrucoes();
        }
    };

    window.editStamp = function(idx) {
        let config = stamps[idx];
        if (!config) return;
        equipBrush();
        
        levelCombo.value = config.level;
        coreCombo.value = config.core;
        
        applyColorStyle(config.color);

        document.getElementById('chkTop').checked = config.bars.top;
        document.getElementById('chkBottom').checked = config.bars.bottom;
        document.getElementById('chkLeft').checked = config.bars.left;
        document.getElementById('chkRight').checked = config.bars.right;
        
        updateMatrixUI();
        
        if (config.level > 1) {
            let trs = matrixTable.querySelectorAll('tr');
            for (let r = 0; r < trs.length; r++) {
                let selects = trs[r].querySelectorAll('select');
                for (let c = 0; c < selects.length; c++) {
                    selects[c].value = config.matrix[r][c];
                }
            }
        }
        updatePreview();
        modal.style.display = 'flex'; 
    };

    let isSelecting = false;
    let hasSelectionBox = false; 
    let selStart = {x: 0, y: 0};
    let selCurrent = {x: 0, y: 0};
    
    paperCanvas.addEventListener('contextmenu', e => e.preventDefault());

    function getMousePos(canvas, evt) {
        var rect = canvas.getBoundingClientRect();
        return {
            x: evt.clientX - rect.left,
            y: evt.clientY - rect.top
        };
    }

    function getSnappedPos(source, rawPos) {
        let dx = rawPos.x - source.x;
        let dy = rawPos.y - source.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        let angle = Math.atan2(dy, dx);
        
        let snapAngle = Math.round(angle / (Math.PI / 4)) * (Math.PI / 4);
        
        return {
            x: source.x + dist * Math.cos(snapAngle),
            y: source.y + dist * Math.sin(snapAngle)
        };
    }

    function redrawPaper(isExporting = false, isTransparent = false) {
        paperCtx.clearRect(0, 0, paperCanvas.width, paperCanvas.height);
        
        if (!isTransparent) {
            paperCtx.fillStyle = "white";
            paperCtx.fillRect(0, 0, paperCanvas.width, paperCanvas.height);
        }

        drawnGlyphs.forEach(g => g.draw(paperCtx));
        
        if (isExporting) return; 
        
        if (alignMode) {
            if (!alignSource && hoveredGlyph) {
                paperCtx.beginPath();
                paperCtx.arc(hoveredGlyph.x, hoveredGlyph.y, hoveredGlyph.radius + 15, 0, Math.PI*2);
                paperCtx.strokeStyle = "rgba(220, 53, 69, 0.8)";
                paperCtx.lineWidth = 3;
                paperCtx.setLineDash([5,5]);
                paperCtx.stroke();
                paperCtx.setLineDash([]);
            } 
            else if (alignSource) {
                paperCtx.save();
                paperCtx.strokeStyle = "rgba(100, 100, 255, 0.3)";
                paperCtx.setLineDash([5, 5]);
                paperCtx.beginPath();
                for(let i=0; i<8; i++) {
                    let angle = i * Math.PI / 4;
                    paperCtx.moveTo(alignSource.x, alignSource.y);
                    paperCtx.lineTo(alignSource.x + 2000 * Math.cos(angle), alignSource.y + 2000 * Math.sin(angle));
                }
                paperCtx.stroke();
                paperCtx.restore();
                
                if (snappedPos) {
                    paperCtx.globalAlpha = 0.4; 
                    let ghostConfig = getActiveConfig();
                    let ghost = new Glyph(snappedPos.x, snappedPos.y, ghostConfig);
                    ghost.draw(paperCtx);
                    paperCtx.globalAlpha = 1.0;
                    
                    paperCtx.fillStyle = "red";
                    paperCtx.beginPath();
                    paperCtx.arc(snappedPos.x, snappedPos.y, 4, 0, Math.PI*2);
                    paperCtx.fill();
                }
            }
        }

        if (hasSelectionBox) {
            paperCtx.strokeStyle = "red";
            paperCtx.lineWidth = 2;
            paperCtx.setLineDash([5, 5]);
            let x = Math.min(selStart.x, selCurrent.x);
            let y = Math.min(selStart.y, selCurrent.y);
            let w = Math.abs(selStart.x - selCurrent.x);
            let h = Math.abs(selStart.y - selCurrent.y);
            paperCtx.strokeRect(x, y, w, h);
            paperCtx.setLineDash([]); 
        }
    }

    paperCanvas.addEventListener('mousedown', e => {
        const pos = getMousePos(paperCanvas, e);
        
        if (e.button === 0) { 
            hasSelectionBox = false; 
            
            if (alignMode) {
                if (!alignSource && hoveredGlyph) {
                    alignSource = hoveredGlyph;
                    updateInstrucoes();
                } else if (alignSource && snappedPos) {
                    let config = getActiveConfig();
                    drawnGlyphs.push(new Glyph(snappedPos.x, snappedPos.y, config));
                }
            } else {
                let config = getActiveConfig();
                drawnGlyphs.push(new Glyph(pos.x, pos.y, config));
                selStart = {x:0,y:0}; selCurrent = {x:0,y:0}; 
            }
            redrawPaper();
            
        } else if (e.button === 2) { 
            if (alignMode && alignSource) {
                alignSource = null;
                updateInstrucoes();
                redrawPaper();
            } else {
                isSelecting = true;
                hasSelectionBox = true; 
                selStart = pos;
                selCurrent = pos;
            }
        }
    });

    paperCanvas.addEventListener('mousemove', e => {
        currentMousePos = getMousePos(paperCanvas, e);
        
        if (isSelecting) {
            selCurrent = currentMousePos;
        }
        
        if (alignMode) {
            if (!alignSource) {
                hoveredGlyph = null;
                for (let g of drawnGlyphs) {
                    let dx = currentMousePos.x - g.x;
                    let dy = currentMousePos.y - g.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < g.radius) {
                        hoveredGlyph = g;
                        break;
                    }
                }
            } else {
                snappedPos = getSnappedPos(alignSource, currentMousePos);
            }
        }
        
        redrawPaper();
    });

    paperCanvas.addEventListener('mouseleave', () => {
        snappedPos = null;
        redrawPaper();
    });

    window.addEventListener('mouseup', e => {
        if (e.button === 2 && isSelecting) {
            isSelecting = false; 
            redrawPaper(); 
        }
    });

    document.getElementById('btnClear').onclick = () => {
        drawnGlyphs = [];
        alignSource = null;
        hasSelectionBox = false;
        updateInstrucoes();
        selStart = {x:0,y:0}; selCurrent = {x:0,y:0};
        redrawPaper();
    };

    function getExportBounds() {
        let cropX, cropY, cropW, cropH;
        let w = Math.abs(selStart.x - selCurrent.x);
        
        if (w > 10 && hasSelectionBox) { 
            cropX = Math.min(selStart.x, selCurrent.x);
            cropY = Math.min(selStart.y, selCurrent.y);
            cropW = w;
            cropH = Math.abs(selStart.y - selCurrent.y);
        } else { 
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            drawnGlyphs.forEach(g => {
                let r = g.radius + 20; 
                if (g.x - r < minX) minX = g.x - r;
                if (g.y - r < minY) minY = g.y - r;
                if (g.x + r > maxX) maxX = g.x + r;
                if (g.y + r > maxY) maxY = g.y + r;
            });
            cropX = Math.max(0, minX - 10);
            cropY = Math.max(0, minY - 10);
            cropW = Math.min(paperCanvas.width - cropX, (maxX - minX) + 20);
            cropH = Math.min(paperCanvas.height - cropY, (maxY - minY) + 20);
        }
        return {x: cropX, y: cropY, w: cropW, h: cropH};
    }

    function exportImage(isTransparent) {
        if (drawnGlyphs.length === 0) return alert("A folha está vazia!");
        
        let bounds = getExportBounds();
        
        selStart = {x:0,y:0}; selCurrent = {x:0,y:0};
        hasSelectionBox = false; 
        
        redrawPaper(true, isTransparent); 

        let tempCanvas = document.createElement('canvas');
        tempCanvas.width = bounds.w;
        tempCanvas.height = bounds.h;
        let tCtx = tempCanvas.getContext('2d');
        
        if (!isTransparent) {
            tCtx.fillStyle = "white";
            tCtx.fillRect(0, 0, bounds.w, bounds.h);
        }
        
        tCtx.drawImage(paperCanvas, bounds.x, bounds.y, bounds.w, bounds.h, 0, 0, bounds.w, bounds.h);

        let link = document.createElement('a');
        link.download = isTransparent ? 'circuito_magico_transparente.png' : 'circuito_magico.png';
        link.href = tempCanvas.toDataURL('image/png');
        link.click();
        
        redrawPaper(false, false); 
    }

    function exportSVG() {
        if (drawnGlyphs.length === 0) return alert("A folha está vazia!");
        
        let bounds = getExportBounds();
        
        // Cabeçalho SVG
        let svgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${bounds.w} ${bounds.h}" width="${bounds.w}" height="${bounds.h}">\n`;
        
        drawnGlyphs.forEach(g => {
            let cx = g.x - bounds.x;
            let cy = g.y - bounds.y;
            let r = g.radius;
            let color = g.config.color;
            
            svgStr += `  <g transform="translate(${cx}, ${cy})">\n`;
            
            // Círculo principal
            svgStr += `    <circle cx="0" cy="0" r="${r}" stroke="${color}" stroke-width="2" fill="none" />\n`;
            
            // Barras
            let bLen = 15;
            if (g.config.bars.top) svgStr += `    <line x1="0" y1="${-r}" x2="0" y2="${-r + bLen}" stroke="${color}" stroke-width="4" stroke-linecap="square"/>\n`;
            if (g.config.bars.bottom) svgStr += `    <line x1="0" y1="${r}" x2="0" y2="${r - bLen}" stroke="${color}" stroke-width="4" stroke-linecap="square"/>\n`;
            if (g.config.bars.left) svgStr += `    <line x1="${-r}" y1="0" x2="${-r + bLen}" y2="0" stroke="${color}" stroke-width="4" stroke-linecap="square"/>\n`;
            if (g.config.bars.right) svgStr += `    <line x1="${r}" y1="0" x2="${r - bLen}" y2="0" stroke="${color}" stroke-width="4" stroke-linecap="square"/>\n`;
            
            // Modificadores da Matriz
            if (g.config.level > 1) {
                let size = (g.config.level * 2) - 1;
                let startX = -(size * CELL_SIZE) / 2 + (CELL_SIZE / 2);
                let startY = -(size * CELL_SIZE) / 2 + (CELL_SIZE / 2);
                
                for (let row = 0; row < size; row++) {
                    for (let col = 0; col < size; col++) {
                        let isCenter = (row === Math.floor(size/2) && col === Math.floor(size/2));
                        let char = g.config.matrix[row][col];
                        
                        // Só desenha se não for o centro e se o char não estiver vazio
                        if (!isCenter && char && char.trim() !== "") {
                            let tx = startX + col * CELL_SIZE;
                            let ty = startY + row * CELL_SIZE;
                            
                            // Escapamos o caractere para evitar erros de XML
                            svgStr += `    <text x="${tx}" y="${ty}" fill="${color}" font-family="Courier, monospace" font-weight="bold" font-size="16px" text-anchor="middle" dy="0.35em">${char}</text>\n`;
                        }
                    }
                }
            }
            
            // Núcleo
            svgStr += `    <text x="0" y="0" fill="#3232c8" font-family="Courier, monospace" font-weight="bold" font-size="18px" text-anchor="middle" dy="0.35em">${g.config.core}</text>\n`;
            
            svgStr += `  </g>\n`;
        });
        
        svgStr += `</svg>`;
        
        // Download
        let blob = new Blob([svgStr], {type: "image/svg+xml;charset=utf-8"});
        let url = URL.createObjectURL(blob);
        let link = document.createElement('a');
        link.download = 'circuito_magico.svg';
        link.href = url;
        link.click();
        URL.revokeObjectURL(url);
        
        // Reset da seleção
        selStart = {x:0,y:0}; selCurrent = {x:0,y:0};
        hasSelectionBox = false; 
        redrawPaper(false, false);
    }

    document.getElementById('btnSaveImage').onclick = () => exportImage(false);
    document.getElementById('btnSaveTransparent').onclick = () => exportImage(true);
    document.getElementById('btnSaveSVG').onclick = exportSVG; // Botão que agora vive na área secreta

    // Inicialização
    updateMatrixUI();
    redrawPaper();

</script>
